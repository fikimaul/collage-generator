<!DOCTYPE html>
<html>
<head>
    <title>Collage Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<div class="max-w-3xl mx-auto p-6 bg-white shadow-xl mt-10 rounded-2xl">

    <h1 class="text-2xl font-bold mb-6 text-center">Collage Generator</h1>

    <div class="grid grid-cols-2 gap-4">

        <div>
            <label class="block text-sm font-medium">Rows</label>
            <input type="number" id="rows" value="2" class="w-full border p-2 rounded">
        </div>

        <div>
            <label class="block text-sm font-medium">Cols</label>
            <input type="number" id="cols" value="3" class="w-full border p-2 rounded">
        </div>

        <div>
            <label class="block text-sm font-medium">Ratio</label>
            <select id="ratio" class="w-full border p-2 rounded">
                <option value="1:1">1:1</option>
                <option value="2:3">2:3</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium">Fit Mode</label>
            <select id="fit" class="w-full border p-2 rounded">
                <option value="contain">Contain (no crop, ada padding)</option>
                <option value="cover">Cover (crop center)</option>
                <option value="fill">Fill (stretch)</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium">Tile Width (px)</label>
            <input type="number" id="tileWidth" value="300" class="w-full border p-2 rounded">
        </div>

    </div>

    <div class="mt-4">
        <label class="block text-sm font-medium">Image URLs (1 per line)</label>
        <textarea id="urls" class="w-full border p-2 rounded h-40"></textarea>
    </div>

    <button onclick="generate()" 
        class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Generate Collage
    </button>

    <div id="result" class="mt-6 text-center"></div>

</div>

<script>
const STORAGE_KEY = "collage_form";

function getFormData() {
    return {
        rows: document.getElementById("rows").value,
        cols: document.getElementById("cols").value,
        ratio: document.getElementById("ratio").value,
        tileWidth: document.getElementById("tileWidth").value,
        fit: document.getElementById("fit").value,
        urls: document.getElementById("urls").value,
    };
}

function setFormData(data) {
    if (!data) return;

    document.getElementById("rows").value = data.rows || 2;
    document.getElementById("cols").value = data.cols || 3;
    document.getElementById("ratio").value = data.ratio || "1:1";
    document.getElementById("tileWidth").value = data.tileWidth || 300;
    document.getElementById("fit").value = data.fit || "contain";
    document.getElementById("urls").value = data.urls || "";
}

function saveToStorage() {
    const data = getFormData();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadFromStorage() {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
        setFormData(JSON.parse(data));
    }
}

function attachAutoSave() {
    ["rows", "cols", "ratio", "tileWidth", "fit", "urls"].forEach(id => {
        document.getElementById(id).addEventListener("input", saveToStorage);
    });
}

window.onload = () => {
    loadFromStorage();
    attachAutoSave();
};

async function generate() {
    saveToStorage();

    const rows = document.getElementById("rows").value;
    const cols = document.getElementById("cols").value;
    const ratio = document.getElementById("ratio").value;
    const urls = document.getElementById("urls").value;
    const tileWidth = document.getElementById("tileWidth").value;
    const fit = document.getElementById("fit").value;

    document.getElementById("result").innerHTML =
        "<p class='text-gray-500'>Processing...</p>";

    const res = await fetch("/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ rows, cols, ratio, urls, tileWidth, fit })
    });

    if (!res.ok) {
        const text = await res.text();
        console.error("Server error:", text);
        document.getElementById("result").innerHTML =
            "<p class='text-red-500'>Server error</p>";
        return;
    }
    const blob = await res.blob();
    const imageUrl = URL.createObjectURL(blob);

    document.getElementById("result").innerHTML = `
        <img src="${imageUrl}" class="mx-auto rounded shadow">
        <br>
        <a href="${imageUrl}" download="collage.jpg">
            <button class="mt-4 bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                Download
            </button>
        </a>
    `;
}
</script>

</body>
</html>
